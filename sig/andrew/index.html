<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Andrew Siemer — Chammy&rsquo;s Equine Sanctuary</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #f3ecda;
      color: #2b4a44;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sig-frame { padding: 2rem; }
    .sig { color: #2b4a44; border-collapse: collapse; }
    .sig td { vertical-align: middle; }
    .sig .mark { padding-right: 18px; }
    .sig .mark img { display: block; width: 64px; height: 64px; }
    .sig .text { border-left: 1px solid rgba(43,74,68,0.25); padding-left: 18px; }
    .sig .name {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: 18px;
      line-height: 1.15;
    }
    .sig .role {
      font-weight: 500;
      font-size: 11px;
      color: #3d5e56;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 3px;
    }
    .sig .meta {
      font-size: 12.5px;
      margin-top: 6px;
      line-height: 1.5;
    }
    .sig .meta .ein { color: #4a6e64; }
    .sig .meta a {
      color: #5a8a7a;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="sig-frame">
  <table class="sig" cellpadding="0" cellspacing="0" border="0" role="presentation">
    <tr>
      <td class="mark">
        <img src="/static/mark-green.png" alt="Chammy&rsquo;s Equine Sanctuary" width="64" height="64">
      </td>
      <td class="text">
        <div class="name">Andrew Siemer</div>
        <div class="role">Chairman of the Board</div>
        <div class="meta">
          Chammy&rsquo;s Equine Sanctuary Foundation<br>
          <span class="ein">501(c)(3) Public Charity &middot; EIN 93-4751200</span><br>
          <a href="https://chammys.org">chammys.org</a>
        </div>
      </td>
    </tr>
  </table>
</div>

</body>
</html>
